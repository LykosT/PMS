server {
    listen 80;

    # API calls go to the backend container; same-origin, so the session
    # cookie and CSRF flow work exactly like the Vite dev proxy.
    location /api/ {
        proxy_pass http://backend:8080;
        # $http_host keeps the port; with $host (port stripped) the backend
        # would treat the browser's same-origin POSTs as cross-origin CORS.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every non-file route serves index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
