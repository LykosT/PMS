# ======================================
# Development Environment
# ======================================

# Server
server.port=8081

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?userUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Flyway is used for database migrations, so we set ddl-auto to none
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Logging
logging.level.org.springframework=DEBUG
logging.level.gr.tl.dev.pms=DEBUG

spring.jpa.properties.hibernate.globally_quoted_identifiers=true