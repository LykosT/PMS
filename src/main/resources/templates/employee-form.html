<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0" th:text="${employeeId} ? 'Edit Employee' : 'Register New Employee'">Register New Employee</h4>
    </div>
    <div class="card-body">

      <form th:action="${employeeId} ? @{/employee/edit/{id}(id=${employeeId})} : @{/employee/create}"
            th:object="${employeeDto}"
            method="post"
            novalidate>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <span th:text="${errorMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <h5 class="mb-3 text-secondary border-bottom pb-2">Personal Information</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" th:field="*{firstName}"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{firstName}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" th:field="*{lastName}"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{lastName}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{email}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" th:field="*{phone}"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{phone}"></div>
          </div>
        </div>

        <h5 class="mt-4 mb-3 text-secondary border-bottom pb-2">Account Details</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''">
            <div class="invalid-feedback" th:errors="*{username}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                   placeholder="Leave empty to keep current password (Edit mode)">
            <div class="invalid-feedback" th:errors="*{password}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">System Role</label>
            <select class="form-select" th:field="*{systemRole}"
                    th:classappend="${#fields.hasErrors('systemRole')} ? 'is-invalid' : ''">
              <option value="" disabled selected>Select Role</option>
              <option th:each="role : ${systemRoles}" th:value="${role}" th:text="${role}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{systemRole}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Seniority Level</label>
            <select class="form-select" th:field="*{seniorityLevel}"
                    th:classappend="${#fields.hasErrors('seniorityLevel')} ? 'is-invalid' : ''">
              <option value="" disabled selected>Select Level</option>
              <option th:each="level : ${seniorityLevels}" th:value="${level}" th:text="${level}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{seniorityLevel}"></div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{employeeStatus}"
                    th:classappend="${#fields.hasErrors('employeeStatus')} ? 'is-invalid' : ''">
              <option value="" disabled selected>Select Status</option>
              <option th:each="status : ${employeeStatuses}" th:value="${status}" th:text="${status}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{employeeStatus}"></div>
          </div>
        </div>

        <div class="mt-4 d-grid gap-2 d-md-flex justify-content-md-end">
          <a th:href="@{/employee}" class="btn btn-secondary me-md-2">Cancel</a>

          <button type="submit" class="btn btn-primary px-4">
            <span th:text="${employeeId} ? 'Update Employee' : 'Create Employee'">Create Employee</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
