<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

  <div class="p-4 mb-4 bg-white rounded-3 shadow-sm border">
    <div class="container-fluid py-2">
      <h1 class="display-5 fw-bold text-dark">Welcome to PMS</h1>
      <p class="col-md-8 fs-4 text-muted">Manage your Company efficiently.</p>
    </div>
  </div>

  <div class="row g-4 mb-4">

    <div class="col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body d-flex align-items-center">
          <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
            <i class="bi bi-people-fill text-primary fs-2"></i>
          </div>
          <div>
            <h6 class="card-subtitle mb-1 text-muted text-uppercase fw-bold" style="font-size: 0.8rem;">
              Total Employees
            </h6>
            <h2 class="card-title mb-0 fw-bold text-dark" th:text="${employeeCount}">0</h2>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
