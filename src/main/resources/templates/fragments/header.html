<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/}">PMS</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"
                           th:classappend="${view == 'fragments/home' ? 'active' : ''}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employee/create}"
                           th:classappend="${view == 'employee-form' ? 'active' : ''}">Register Employee</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/employee/view}"
                           th:classappend="${view == 'employee-view' ? 'active' : ''}">Employees</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center">
                    <div th:if="${#authentication != null}" class="text-light me-3">
                        <small>Welcome, <span class="fw-bold" th:text="${#authentication.name}">User</span></small>
                    </div>

                    <a th:if="${#authentication == null}" th:href="@{/login}" class="btn btn-outline-light btn-sm">Login</a>

                    <form th:if="${#authentication != null}" th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>
</header>

</body>
</html>
